; Hoeheres Upload-Limit fuer Video-Feedback (siehe api/feedback.php).
; Wirksam bei PHP-FPM (im Gegensatz zu php_value in .htaccess), gilt fuer diesen
; Ordner und alle Unterordner. Aenderungen greifen mit etwas Verzoegerung
; (PHP cached .user.ini standardmaessig 300 Sekunden).
upload_max_filesize = 25M
post_max_size = 25M
max_execution_time = 120
